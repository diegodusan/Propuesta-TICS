<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Misión Tránsito y Leyendas</title>
    
    <!-- Fuentes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;800;900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Nunito', 'sans-serif'] },
                    colors: {
                        primary: '#38bdf8', secondary: '#facc15',
                        accent: '#fb7185', success: '#4ade80', dark: '#1e293b'
                    }
                }
            }
        }
    </script>

    <!-- Estilos Externos -->
    <link rel="stylesheet" href="css/styles.css">

    <!-- Librerías Externas -->
    <!-- SortableJS: Drag and Drop Robusto para Táctil -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <!-- Confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body class="flex flex-col h-screen w-full mx-auto text-dark">

    <div class="flex-1 w-full max-w-4xl mx-auto p-4 sm:p-6 flex flex-col h-full">
        <!-- Cabecera -->
        <header class="flex flex-col sm:flex-row sm:justify-between items-center mb-6 bg-white p-4 rounded-3xl shadow-sm border-4 border-white gap-4">
            <div class="flex items-center gap-3 w-full sm:w-auto">
                <div class="text-5xl floating">🦉</div>
                <div class="flex-1">
                    <h1 class="text-xl sm:text-2xl font-black text-primary leading-tight">Misión Tránsito <br> y Leyendas</h1>
                    <p id="instructor-text" class="text-sm font-bold text-gray-500">¡Arma la oración correcta!</p>
                </div>
            </div>
            
            <div class="flex flex-col items-center sm:items-end gap-2 w-full sm:w-auto">
                <div id="module-indicators" class="flex gap-1 text-2xl sm:text-3xl">
                    <!-- Dinámico -->
                </div>
                <div class="bg-secondary text-dark font-black px-4 py-1 rounded-full text-sm">
                    Puntos: <span id="score-display">0</span>
                </div>
            </div>
        </header>

        <!-- Área de Juego -->
        <main class="flex-1 flex flex-col items-center justify-between gap-4 h-full">
            
            <!-- Barra de Progreso del Módulo Actual -->
            <div class="w-full max-w-sm px-2">
                <p id="module-title" class="text-center font-bold text-gray-500 uppercase tracking-widest text-xs mb-1">Cargando...</p>
                <div class="progress-container">
                    <div id="progress-bar" class="progress-bar"></div>
                </div>
            </div>

            <!-- Pista Visual -->
            <div class="bg-white w-full max-w-sm rounded-3xl p-6 shadow-md border-4 border-blue-200 text-center flex flex-col items-center justify-center min-h-[160px]">
                <div id="visual-cue" class="text-8xl sm:text-9xl drop-shadow-md transition-all duration-300"></div>
            </div>

            <!-- Zona de Construcción (Casillas Destino) -->
            <div id="construction-zone" class="slot-container w-full py-2">
                <!-- Generado por JS -->
            </div>

            <!-- Caja de Palabras (Origen) -->
            <div class="w-full mt-auto">
                <p class="text-center font-bold text-gray-500 mb-2">Arrastra las palabras hacia arriba</p>
                <div id="word-bank" class="word-bank">
                    <!-- Generado por JS -->
                </div>
            </div>

            <!-- Botón -->
            <button id="check-btn" class="w-full btn-3d bg-success text-white font-black text-3xl py-4 mt-4 border-b-[8px] border-green-600 mb-2 flex items-center justify-center gap-2">
                <span class="text-3xl">✅</span> ¡Revisar!
            </button>
        </main>
    </div>

    <!-- Scripts de la App -->
    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
