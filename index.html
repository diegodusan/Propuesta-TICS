<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Misión Tránsito y Leyendas</title>
    
    <!-- Fuentes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;800;900&display=swap" rel="stylesheet">
    
    <!-- Favicon (Emoji de Búho) -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🦉</text></svg>">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Nunito', 'sans-serif'] },
                    colors: {
                        primary: '#38bdf8', secondary: '#facc15',
                        accent: '#fb7185', success: '#4ade80', dark: '#1e293b'
                    }
                }
            }
        }
    </script>

    <!-- Estilos Externos -->
    <link rel="stylesheet" href="css/styles.css">

    <!-- Librerías Externas -->
    <!-- SortableJS: Drag and Drop Robusto para Táctil -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <!-- Confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body class="flex flex-col h-[100dvh] w-full mx-auto text-dark overflow-hidden">

    <div class="flex-1 w-full max-w-4xl mx-auto p-2 sm:p-4 flex flex-col h-full gap-2 relative">
        
        <!-- Pantalla de Selección de Módulos -->
        <div id="screen-selection" class="screen flex flex-col h-full w-full justify-center items-center gap-6">
            <h1 class="text-3xl sm:text-4xl font-black text-primary text-center mb-4">Elige tu Misión</h1>
            <div id="module-grid" class="w-full grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4">
                <!-- Generado por JS -->
            </div>
        </div>

        <!-- Pantalla de Lección -->
        <div id="screen-lesson" class="screen hidden flex flex-col h-full w-full justify-center items-center gap-6 p-4">
            <div class="speech-bubble relative bg-white border-4 border-secondary rounded-3xl p-6 shadow-lg max-w-md text-center">
                <h2 id="lesson-title" class="text-xl font-bold text-accent mb-2"></h2>
                <p id="lesson-text" class="text-lg text-gray-700 font-semibold leading-relaxed"></p>
                <div class="absolute -bottom-4 left-1/2 -translate-x-1/2 w-8 h-8 bg-white border-b-4 border-r-4 border-secondary transform rotate-45"></div>
            </div>
            
            <div id="lesson-animal" class="text-8xl sm:text-[10rem] my-4 drop-shadow-xl animal-anim"></div>
            
            <button id="btn-start-game" class="btn-3d bg-primary text-white font-black text-2xl py-3 px-10 rounded-full border-b-[6px] border-blue-600 mt-4">
                ¡Vamos!
            </button>
        </div>

        <!-- Área de Juego (Actual) -->
        <div id="screen-game" class="screen hidden flex flex-col h-full w-full gap-2">
            <!-- Cabecera Pequeña -->
        <header class="flex flex-row justify-between items-center bg-white px-3 py-1 rounded-2xl shadow-sm border-2 border-white gap-2 shrink-0">
            <div class="flex items-center gap-2">
                <div class="text-3xl floating">🦉</div>
                <div class="flex flex-col">
                    <h1 class="text-sm sm:text-base font-black text-primary leading-none">Misión Tránsito</h1>
                    <p id="instructor-text" class="text-xs font-bold text-gray-500 leading-none mt-1">¡Arma la oración!</p>
                </div>
            </div>
            
            <div class="flex flex-col items-end gap-1">
                <div id="module-indicators" class="flex gap-1 text-lg sm:text-xl">
                    <!-- Dinámico -->
                </div>
                <div class="bg-secondary text-dark font-black px-2 py-0.5 rounded-full text-xs">
                    Pts: <span id="score-display">0</span>
                </div>
            </div>
        </header>

        <!-- Área de Juego -->
        <main class="flex-1 flex flex-col items-center justify-between h-full min-h-0 w-full">
            
            <!-- Barra de Progreso del Módulo Actual -->
            <div class="w-full max-w-sm px-2 shrink-0">
                <p id="module-title" class="text-center font-bold text-gray-500 uppercase tracking-widest text-[10px] sm:text-xs mb-1">Cargando...</p>
                <div class="progress-container h-2 mt-0">
                    <div id="progress-bar" class="progress-bar"></div>
                </div>
            </div>

            <!-- Pista Visual (Flexible y Grande) -->
            <div class="bg-white w-full max-w-sm rounded-3xl p-2 sm:p-4 shadow-md border-4 border-blue-200 text-center flex flex-col items-center justify-center flex-1 my-2 shrink min-h-0">
                <div id="visual-cue" class="text-7xl sm:text-8xl md:text-9xl drop-shadow-md transition-all duration-300"></div>
            </div>

            <!-- Zona de Construcción (Casillas Destino) -->
            <div id="construction-zone" class="slot-container w-full py-1 shrink-0">
                <!-- Generado por JS -->
            </div>

            <!-- Área Inferior: Caja de Palabras y Botón Redondo -->
            <div class="w-full mt-auto flex flex-row items-center gap-2 sm:gap-4 shrink-0 pb-1">
                <div class="flex-1">
                    <p class="text-center font-bold text-gray-500 text-xs sm:text-sm mb-1">Arrastra hacia arriba</p>
                    <div id="word-bank" class="word-bank">
                        <!-- Generado por JS -->
                    </div>
                </div>
                <!-- Botón Redondo -->
                <button id="check-btn" class="btn-3d bg-success text-white w-14 h-14 sm:w-16 sm:h-16 shrink-0 rounded-full border-b-[6px] border-green-600 flex items-center justify-center mt-4" title="¡Revisar!">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 sm:h-10 sm:w-10 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="4">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                    </svg>
                </button>
            </div>
        </main>
        </div>
    </div>

    <!-- Audios -->
    <audio id="sfx-success" src="https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3" preload="auto"></audio>
    <audio id="sfx-error" src="https://assets.mixkit.co/active_storage/sfx/2954/2954-preview.mp3" preload="auto"></audio>
    <audio id="sfx-module" src="https://assets.mixkit.co/active_storage/sfx/2020/2020-preview.mp3" preload="auto"></audio>
    <audio id="sfx-streak" src="https://assets.mixkit.co/active_storage/sfx/2018/2018-preview.mp3" preload="auto"></audio>

    <!-- Scripts de la App -->
    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
