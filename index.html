<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Misión Tránsito y Leyendas</title>
    
    <!-- Fuentes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;800;900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Nunito', 'sans-serif'] },
                    colors: {
                        primary: '#38bdf8', secondary: '#facc15',
                        accent: '#fb7185', success: '#4ade80', dark: '#1e293b'
                    }
                }
            }
        }
    </script>

    <!-- Estilos Externos -->
    <link rel="stylesheet" href="css/styles.css">

    <!-- Librerías Externas -->
    <!-- SortableJS: Drag and Drop Robusto para Táctil -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <!-- Confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body class="flex flex-col min-h-screen w-full mx-auto text-dark overflow-x-hidden">

    <div class="flex-1 w-full max-w-4xl mx-auto p-3 sm:p-6 flex flex-col h-full">
        <!-- Cabecera -->
        <header class="flex flex-col sm:flex-row sm:justify-between items-center mb-6 bg-white p-4 rounded-3xl shadow-sm border-4 border-white gap-4">
            <div class="flex items-center gap-3 w-full sm:w-auto">
                <div class="text-5xl floating">🦉</div>
                <div class="flex-1">
                    <h1 class="text-xl sm:text-2xl font-black text-primary leading-tight">Misión Tránsito <br> y Leyendas</h1>
                    <p id="instructor-text" class="text-sm font-bold text-gray-500">¡Arma la oración correcta!</p>
                </div>
            </div>
            
            <div class="flex flex-col items-center sm:items-end gap-2 w-full sm:w-auto">
                <div id="module-indicators" class="flex gap-1 text-2xl sm:text-3xl">
                    <!-- Dinámico -->
                </div>
                <div class="bg-secondary text-dark font-black px-4 py-1 rounded-full text-sm">
                    Puntos: <span id="score-display">0</span>
                </div>
            </div>
        </header>

        <!-- Área de Juego -->
        <main class="flex-1 flex flex-col items-center justify-between gap-4 h-full">
            
            <!-- Barra de Progreso del Módulo Actual -->
            <div class="w-full max-w-sm px-2">
                <p id="module-title" class="text-center font-bold text-gray-500 uppercase tracking-widest text-xs mb-1">Cargando...</p>
                <div class="progress-container">
                    <div id="progress-bar" class="progress-bar"></div>
                </div>
            </div>

            <!-- Pista Visual -->
            <div class="bg-white w-full max-w-sm rounded-3xl p-4 sm:p-6 shadow-md border-4 border-blue-200 text-center flex flex-col items-center justify-center min-h-[140px] sm:min-h-[160px]">
                <div id="visual-cue" class="text-8xl sm:text-9xl drop-shadow-md transition-all duration-300"></div>
            </div>

            <!-- Zona de Construcción (Casillas Destino) -->
            <div id="construction-zone" class="slot-container w-full py-2">
                <!-- Generado por JS -->
            </div>

            <!-- Área Inferior: Caja de Palabras y Botón Redondo -->
            <div class="w-full mt-auto flex flex-row items-center gap-4">
                <div class="flex-1">
                    <p class="text-center font-bold text-gray-500 mb-2 text-sm sm:text-base">Arrastra las palabras hacia arriba</p>
                    <div id="word-bank" class="word-bank">
                        <!-- Generado por JS -->
                    </div>
                </div>
                <!-- Botón Redondo -->
                <button id="check-btn" class="btn-3d bg-success text-white w-16 h-16 sm:w-20 sm:h-20 shrink-0 rounded-full border-b-[6px] sm:border-b-[8px] border-green-600 flex items-center justify-center mt-6" title="¡Revisar!">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 sm:h-12 sm:w-12 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="4">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                    </svg>
                </button>
            </div>
        </main>
    </div>

    <!-- Audios -->
    <audio id="sfx-success" src="https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3" preload="auto"></audio>
    <audio id="sfx-error" src="https://assets.mixkit.co/active_storage/sfx/2954/2954-preview.mp3" preload="auto"></audio>
    <audio id="sfx-module" src="https://assets.mixkit.co/active_storage/sfx/2020/2020-preview.mp3" preload="auto"></audio>
    <audio id="sfx-streak" src="https://assets.mixkit.co/active_storage/sfx/2018/2018-preview.mp3" preload="auto"></audio>

    <!-- Scripts de la App -->
    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
